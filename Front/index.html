<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cabana do Mistério</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" type="imagex/png" href="logo.webp">
</head>

<body>
    <header>
        <h1>Cabana do Mistério</h1>
        <button onclick="cadastro.classList.remove('oculto')">
            Adicionar Produto
        </button>
    </header>
    <main></main>
    <div id="cadastro" class="modal oculto">
        <div class="janela">
            <h2>Adicionar Produto</h2>
            <form id="formCad">
                <label>Nome do Produto</label>
                <input type="text" id="nome" required>
                <label>URL da imagem</label>
                <input type="text" id="urlImagem">
                <label>Preço</label>
                <input type="number" id="preco">
                <label>Categoria</label>
                <input type="text" id="categotia">
                <label>Marca</label>
                <input type="text" id="marca">
                <br><br>
                <button type="reset" onclick="cadastro.classList.add('oculto')">
                    Cancelar
                </button>
                <button type="submit">
                    Salvar
                </button>
            </form>
        </div>
    </div>
    <div id="detalhes" class="modal oculto">
        <div class="janela">
            <h2 id="tituloProduto"></h2>
            <img id="imgProduto">
            <p><b>Nome</b></p>
            <input type="text" id="nomeEdit">
            <p><b>Imagem (URL)</b></p>
            <input type="text" id="imgEdit">
            <label>Preço</label>
            <input type="number" id="precoEdit">
            <label>Categoria</label>
            <input type="text" id="categotiaEdit">
            <label>Marca</label>
            <input type="text" id="marcaEdit">
            <br><br>
            <br><br>
            <button onclick="salvarEdicao()">Salvar</button>
            <button onclick="excluirProdutoAtual()">Excluir</button>
            <button onclick="detalhes.classList.add('oculto')">
                Fechar
            </button>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
